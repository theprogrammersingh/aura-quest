# apphosting.yaml
# Firebase App Hosting Configuration for AuraQuest (Next.js SSR App)

# Cloud Run container resource allocations
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

# Environment variables and secrets configuration
env:
  - variable: DATABASE_URL
    secret: auraquest_database_url
    availability:
      - RUNTIME
  - variable: GEMINI_API_KEY
    secret: auraquest_gemini_api_key
    availability:
      - RUNTIME
  - variable: JWT_SECRET
    secret: auraquest_jwt_secret
    availability:
      - RUNTIME
