<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#161933"/>
      <stop offset="100%" stop-color="#0b0c16"/>
    </radialGradient>
    
    <!-- Outer Glow Gradient -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2be2" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00ffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Star Glow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="512" height="512" fill="url(#bg)" rx="128"/>

  <!-- Glowing Aura Rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.6" filter="url(#neon-glow)"/>
  
  <!-- Celestial Crystal Core -->
  <g transform="translate(256, 256) scale(0.95)" filter="url(#neon-glow)">
    <!-- Starburst center -->
    <path d="M-80,0 L80,0 M0,-80 L0,80" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Main glowing crystal diamond -->
    <polygon points="0,-110 80,0 0,110 -80,0" fill="url(#glow)" opacity="0.85"/>
    <polygon points="0,-70 50,0 0,70 -50,0" fill="#ffffff" opacity="0.9"/>
    
    <!-- Floating tiny stars -->
    <circle cx="-110" cy="-110" r="6" fill="#00ffff"/>
    <circle cx="110" cy="110" r="6" fill="#ff007f"/>
    <circle cx="110" cy="-110" r="8" fill="#ffffff"/>
    <circle cx="-110" cy="110" r="8" fill="#8a2be2"/>
  </g>
</svg>
